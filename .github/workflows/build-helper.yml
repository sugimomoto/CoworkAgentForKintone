name: Build Helper

# OSS 配布用 kintone ヘルパーライブラリ (Python) のビルド
#
# - PR / push: Lint + 型 + テスト + ビルド + Artifact 7 日保管
# - tag push (helper-v*): 同上 + GitHub Release に wheel/sdist を添付
#                       + TestPyPI に publish (alpha 配布チャネル)

on:
  pull_request:
    paths:
      - 'packages/kintone-helper/**'
      - '.github/workflows/build-helper.yml'
  push:
    branches: [main]
    paths:
      - 'packages/kintone-helper/**'
      - '.github/workflows/build-helper.yml'
    tags:
      - 'helper-v*'
  workflow_dispatch:

defaults:
  run:
    working-directory: packages/kintone-helper

permissions:
  contents: write  # tag push 時の Release 作成に必要

jobs:
  test:
    name: Test (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.11', '3.12', '3.13']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: packages/kintone-helper/pyproject.toml

      - name: Install package + dev dependencies
        run: pip install -e '.[dev]'

      - name: Ruff lint
        run: ruff check

      - name: Ruff format check
        run: ruff format --check

      - name: mypy strict
        run: mypy

      - name: pytest with coverage
        run: pytest

  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install hatch
        run: pip install hatch

      - name: Build
        run: hatch build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: helper-dist
          path: packages/kintone-helper/dist/*
          retention-days: 7

      - name: Attach to GitHub Release (only on helper-v* tag)
        if: startsWith(github.ref, 'refs/tags/helper-v')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/kintone-helper/dist/*
          generate_release_notes: true

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/helper-v')
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: helper-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          packages-dir: dist/
          skip-existing: true   # 同じバージョンを再 push しても CI を落とさない
