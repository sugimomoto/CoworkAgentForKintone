<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cowork Agent — プリセットエージェント一覧 UX 検討</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #f0eee9; }
    body { font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif; }

    /* ── kintone host frame (推奨案の文脈表示用) ── */
    .kt { width: 100%; height: 100%; display: flex; flex-direction: column; background: #fafbfc; color: #374151; }
    .kt-top { height: 34px; background: #231200; color: #f5e6b8; display: flex; align-items: center; padding: 0 14px; font-size: 11.5px; gap: 14px; flex: 0 0 auto; }
    .kt-logo { display: flex; align-items: center; gap: 6px; font-weight: 700; color: #ffbf00; letter-spacing: .3px; }
    .kt-logo-mark { width: 18px; height: 18px; border-radius: 5px; background: #ffbf00; color: #231200; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; }
    .kt-crumb { flex: 1; color: #9a8f7a; }
    .kt-appbar { height: 48px; background: #fff; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; padding: 0 18px; gap: 12px; flex: 0 0 auto; }
    .kt-app-icon { width: 28px; height: 28px; border-radius: 6px; background: #ffbf00; color: #231200; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; }
    .kt-app-title { font-size: 14px; font-weight: 600; color: #111827; }
    .kt-toolbar { margin-left: auto; display: flex; gap: 8px; }
    .kt-btn { padding: 5px 12px; font-size: 11.5px; border-radius: 4px; border: 1px solid #d1d5db; background: #fff; color: #374151; }
    .kt-btn.primary { background: #ffbf00; color: #231200; border-color: #f0b400; font-weight: 600; }
    .kt-body { flex: 1; display: flex; min-height: 0; }
    .kt-list { flex: 1; padding: 16px 22px; overflow: hidden; background: #fafbfc; }
    .kt-tabs { display: flex; gap: 2px; margin-bottom: 12px; border-bottom: 1px solid #e5e7eb; }
    .kt-tab { padding: 7px 13px; font-size: 11.5px; color: #6b7280; border-bottom: 2px solid transparent; }
    .kt-tab.active { color: #231200; border-bottom-color: #ffbf00; font-weight: 600; }
    .kt-table { width: 100%; border-collapse: collapse; font-size: 11.5px; background: #fff; border: 1px solid #e5e7eb; border-radius: 4px; }
    .kt-table th { background: #f9fafb; color: #6b7280; font-weight: 500; text-align: left; padding: 9px 11px; border-bottom: 1px solid #e5e7eb; font-size: 10.5px; }
    .kt-table td { padding: 10px 11px; border-bottom: 1px solid #f3f4f6; color: #374151; }
    .kt-chip { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 500; }
    .kt-chip.new { background: #fff4c9; color: #8a6400; }
    .kt-chip.pending { background: #f3ead6; color: #231200; }
    .kt-chip.done { background: #231200; color: #ffbf00; }
    .kt-panel { width: 380px; height: 100%; border-left: 1px solid #e5e7eb; background: #fff; flex: 0 0 auto; }
    .kt-panel.narrow { width: 360px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- 依存順: header chrome → preset 基盤 → preset レイアウト → canvas → glue -->
  <script type="text/babel" src="wedge-header.jsx"></script>
  <script type="text/babel" src="preset-agents.jsx"></script>
  <script type="text/babel" src="preset-layouts.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>

  <script type="text/babel">
    const ACCENT = '#0d9488';

    // ── kintone ホストフレーム — 推奨案を業務画面の文脈で見せる ──
    function KintoneHost({ children, narrow }) {
      const rows = [
        ['#1042', '株式会社サクラ商事 — 新規導入', '田中', '¥2,400,000', '6/05', 'new', '新規'],
        ['#1041', 'みらいテック — 追加ライセンス', '佐藤', '¥860,000', '6/04', 'pending', '対応中'],
        ['#1039', '北斗物流 — 更新見込み', '鈴木', '¥1,180,000', '6/03', 'pending', '対応中'],
        ['#1037', 'グリーン製作所 — 保守契約', '高橋', '¥540,000', '6/02', 'done', '完了'],
        ['#1034', 'ヤマト印刷 — 初回商談', '渡辺', '¥0', '6/01', 'new', '新規'],
      ];
      return (
        <div className="kt">
          <div className="kt-top">
            <div className="kt-logo"><span className="kt-logo-mark">k</span>kintone</div>
            <span className="kt-crumb">営業部 ポータル / 案件管理</span>
          </div>
          <div className="kt-appbar">
            <div className="kt-app-icon">案</div>
            <div className="kt-app-title">案件管理</div>
            <div className="kt-toolbar">
              <button className="kt-btn">絞り込む</button>
              <button className="kt-btn primary">レコードを追加</button>
            </div>
          </div>
          <div className="kt-body">
            <div className="kt-list">
              <div className="kt-tabs">
                <div className="kt-tab active">一覧</div>
                <div className="kt-tab">カレンダー</div>
                <div className="kt-tab">グラフ</div>
              </div>
              <table className="kt-table">
                <thead>
                  <tr>
                    <th>レコード番号</th><th>案件名</th><th>担当</th>
                    <th>金額</th><th>更新日</th><th>ステータス</th>
                  </tr>
                </thead>
                <tbody>
                  {rows.map((r) => (
                    <tr key={r[0]}>
                      <td style={{ color: '#9ca3af', fontFamily: 'JetBrains Mono, monospace', fontSize: 10.5 }}>{r[0]}</td>
                      <td style={{ fontWeight: 500 }}>{r[1]}</td>
                      <td>{r[2]}</td>
                      <td style={{ fontVariantNumeric: 'tabular-nums' }}>{r[3]}</td>
                      <td style={{ color: '#9ca3af' }}>{r[4]}</td>
                      <td><span className={'kt-chip ' + r[5]}>{r[6]}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div className={'kt-panel' + (narrow ? ' narrow' : '')}>
              {children}
            </div>
          </div>
        </div>
      );
    }

    const c = presetColors(ACCENT);

    // パネル単体の枠 (微妙な境界線 + 影) — canvas 上で kintone 右ペインに見せる
    function PanelFrame({ children }) {
      return (
        <div style={{ width: '100%', height: '100%', borderLeft: `1px solid ${c.cardBorder}`, background: c.bg }}>
          {children}
        </div>
      );
    }

    const PW = 380, PH = 780; // パネル幅 / 高さ

    function App() {
      return (
        <DesignCanvas>
          {/* ───────── 1. 4 レイアウト案 ───────── */}
          <DCSection
            id="layouts"
            title="4 レイアウト案"
            subtitle="幅 380px のチャットパネル単体で比較 — Phase 1 の 3 エージェント (業務 / Customizer Opus / Sonnet)">
            <DCArtboard id="a" label="案 A — アコーディオン (縦リスト)" width={PW} height={PH}>
              <PanelFrame><LayoutAccordion c={c} accent={ACCENT} /></PanelFrame>
            </DCArtboard>
            <DCArtboard id="b" label="案 B — タブ切替 (2列グリッド)" width={PW} height={PH}>
              <PanelFrame><LayoutTabs c={c} accent={ACCENT} /></PanelFrame>
            </DCArtboard>
            <DCArtboard id="c" label="案 C — 全件スタック (横スクロールチップ)" width={PW} height={PH}>
              <PanelFrame><LayoutStack c={c} accent={ACCENT} /></PanelFrame>
            </DCArtboard>
            <DCArtboard id="d" label="案 D — カルーセル (1画面1エージェント)" width={PW} height={PH}>
              <PanelFrame><LayoutCarousel c={c} accent={ACCENT} /></PanelFrame>
            </DCArtboard>
          </DCSection>

          {/* ───────── 2. 推奨案 — アコーディオン ───────── */}
          <DCSection
            id="recommended"
            title="推奨案 — A アコーディオン"
            subtitle="kintone 画面内での文脈・狭幅 360px・10 個以上への拡張を検証">
            <DCArtboard id="in-context" label="kintone 画面内での見え方 (右ペイン 380px)" width={1180} height={PH}>
              <KintoneHost>
                <LayoutAccordion c={c} accent={ACCENT} />
              </KintoneHost>
            </DCArtboard>
            <DCArtboard id="w360" label="幅 360px ちょうど (最小幅の成立確認)" width={360} height={PH}>
              <PanelFrame><LayoutAccordion c={c} accent={ACCENT} /></PanelFrame>
            </DCArtboard>
            <DCArtboard id="scale10" label="10 個以上 (#46 マーケットプレイス後 — 検索 + 折りたたみ)" width={PW} height={PH}>
              <PanelFrame><LayoutAccordion c={c} accent={ACCENT} agents={PRESET_AGENTS_10} search /></PanelFrame>
            </DCArtboard>
          </DCSection>

          {/* ───────── 3. 遷移マイクロインタラクション ───────── */}
          <DCSection
            id="transition"
            title="遷移マイクロインタラクション"
            subtitle="プロンプト押下 → user バブルへモーフ → 同じエージェントが応答 (3 フレーム)">
            <DCArtboard id="press" label="① 押下 — accent で塗り、わずかに沈む" width={PW} height={PH}>
              <PanelFrame><StoryPress c={c} accent={ACCENT} /></PanelFrame>
            </DCArtboard>
            <DCArtboard id="morph" label="② 変形 — リストが退場、プロンプトが user バブルへ" width={PW} height={PH}>
              <PanelFrame><StoryMorph c={c} accent={ACCENT} /></PanelFrame>
            </DCArtboard>
            <DCArtboard id="chat" label="③ チャット — 選択エージェントがストリーミング応答" width={PW} height={PH}>
              <PanelFrame><StoryChat c={c} accent={ACCENT} /></PanelFrame>
            </DCArtboard>
          </DCSection>

          {/* ───────── 4. エッジケース ───────── */}
          <DCSection
            id="edges"
            title="エッジケース"
            subtitle="サンプル 0 個 / エージェント 1 個のみ — 10 個以上は推奨案セクションを参照">
            <DCArtboard id="noprompts" label="サンプルプロンプト 0 個 — 空状態 CTA" width={PW} height={PH}>
              <PanelFrame><EdgeNoPrompts c={c} accent={ACCENT} /></PanelFrame>
            </DCArtboard>
            <DCArtboard id="single" label="エージェント 1 個のみ — リスト省略・即提示" width={PW} height={PH}>
              <PanelFrame><EdgeSingleAgent c={c} accent={ACCENT} /></PanelFrame>
            </DCArtboard>
          </DCSection>

          {/* ───────── 5. 比較と推奨 ───────── */}
          <DCSection
            id="analysis"
            title="比較と推奨"
            subtitle="トレードオフ評価・推奨理由・設計メモ">
            <DCArtboard id="comparison" label="4 案 比較表" width={760} height={640}>
              <ComparisonCard accent={ACCENT} />
            </DCArtboard>
            <DCArtboard id="rationale" label="推奨と設計メモ" width={600} height={780}>
              <RationaleCard accent={ACCENT} />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
