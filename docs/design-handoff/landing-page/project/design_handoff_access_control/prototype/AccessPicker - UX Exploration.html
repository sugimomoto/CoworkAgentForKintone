<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cowork Agent — 公開先 (ACL) UI 検討</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #f0eee9; }
    body { font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif; }
    * { box-sizing: border-box; }
    .ac-spin { animation: ac-rot 0.7s linear infinite; transform-origin: center; }
    @keyframes ac-rot { to { transform: rotate(360deg); } }
    .ac-caret { animation: ac-blink 1.05s step-end infinite; }
    @keyframes ac-blink { 50% { opacity: 0; } }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: rgba(35,18,0,0.16); border-radius: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- 依存順: canvas → data → picker 本体 → 探索用 → glue -->
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="access-data.jsx"></script>
  <script type="text/babel" src="access-picker.jsx"></script>
  <script type="text/babel" src="access-explore.jsx"></script>

  <script type="text/babel">
    const { AC, MONO } = window;

    // ── 公開先セクションの見出し (既存 Settings の SectionLabel に準拠) ──
    function SecHead({ desc }) {
      return (
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, margin: '0 0 10px 2px' }}>
          <span style={{ fontSize: 11.5, fontWeight: 700, letterSpacing: '.04em', color: AC.text }}>公開先</span>
          <span style={{ fontSize: 10.5, color: AC.subtle }}>{desc}</span>
        </div>
      );
    }

    // ── セクション単体フレーム (モーダル body 幅 = 680, レイアウト比較用) ──
    function SectionFrame({ desc, children }) {
      return (
        <div style={{ width: '100%', height: '100%', background: AC.bg, padding: '20px 24px', overflowY: 'auto' }}>
          <SecHead desc={desc || 'このエージェントを使えるユーザーを指定（空＝全員）'} />
          {children}
        </div>
      );
    }

    // ── モーダル全体の文脈フレーム (前後セクションを薄く添える) ──
    function GhostSection({ title, sub }) {
      return (
        <div style={{ margin: '0 0 14px', opacity: 0.5 }}>
          <div style={{ fontSize: 11.5, fontWeight: 700, letterSpacing: '.04em', color: AC.text, marginBottom: 8, marginLeft: 2 }}>{title}</div>
          <div style={{ background: AC.card, border: `1px solid ${AC.cardBorder}`, borderRadius: 11, padding: '13px 14px', fontSize: 11.5, color: AC.subtle }}>{sub}</div>
        </div>
      );
    }
    function ModalShell({ children }) {
      return (
        <div style={{ width: '100%', height: '100%', background: AC.bg, display: 'flex', flexDirection: 'column', borderRadius: 14, overflow: 'hidden', border: `1px solid ${AC.border}` }}>
          {/* header */}
          <div style={{ flex: '0 0 auto', display: 'flex', alignItems: 'center', gap: 11, padding: '14px 20px', background: AC.card, borderBottom: `1px solid ${AC.border}` }}>
            <div style={{ width: 30, height: 30, borderRadius: 8, background: AC.accent, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M7 3c-1.5 0-2 1-2 2v6c0 1-.7 2-2 2 1.3 0 2 1 2 2" transform="translate(1 -2)"/><rect x="3" y="5" width="10" height="8" rx="2"/><path d="M8 5V2.5M6 8v.5M10 8v.5"/></svg>
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: AC.text }}>カスタマイザーエージェント (Opus) を編集</div>
              <div style={{ fontSize: 10.5, color: AC.muted, marginTop: 1 }}>Built-in · 変更は新規セッションから反映</div>
            </div>
            <button style={{ width: 28, height: 28, borderRadius: 7, border: 'none', background: 'transparent', color: AC.muted, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M3 3l8 8M11 3l-8 8"/></svg>
            </button>
          </div>
          {/* body */}
          <div style={{ flex: 1, overflowY: 'auto', padding: '18px 20px 24px' }}>
            <GhostSection title="クイックアクション" sub="（既存）チャット入力欄の上に出すサンプル操作 …" />
            <div style={{ height: 1, background: AC.border, margin: '0 0 16px' }} />
            <SecHead desc="このエージェントを使えるユーザーを指定（空＝全員）" />
            {children}
            <div style={{ height: 1, background: AC.border, margin: '16px 0' }} />
            <GhostSection title="Skills" sub="（既存）ワークスペース skill を個別に ON / OFF …" />
          </div>
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas>
          {/* 1. レイアウト 4 案 */}
          <DCSection id="layouts" title="公開先セクション — 4 レイアウト案"
            subtitle="モーダル幅 680px・3 軸 (ユーザー / グループ / 組織) の incremental search ピッカー。各案ともクリックで実際に検索・追加・削除できます。">
            <DCArtboard id="a" label="案 A — 縦スタック / OR カード（推奨）" width={680} height={760}>
              <SectionFrame><AccessPicker initial={window.V_BALANCED} /></SectionFrame>
            </DCArtboard>
            <DCArtboard id="b" label="案 B — タブ切替（1 検索に集中）" width={680} height={620}>
              <SectionFrame><VariantTabs initial={window.V_BALANCED} /></SectionFrame>
            </DCArtboard>
            <DCArtboard id="c" label="案 C — 横 3 カラム（680px では窮屈）" width={680} height={560}>
              <SectionFrame><VariantColumns initial={window.V_BALANCED} /></SectionFrame>
            </DCArtboard>
            <DCArtboard id="d" label="案 D — 統合 1 検索（種別横断）" width={680} height={640}>
              <SectionFrame><VariantUnified initial={window.V_BALANCED} /></SectionFrame>
            </DCArtboard>
          </DCSection>

          {/* 2. 推奨案を文脈で */}
          <DCSection id="context" title="推奨案 A — モーダル内の文脈"
            subtitle="クイックアクションと Skills の間に差し込んだ状態。「全員に公開」(全空) と「指定公開」(絞込済) の見え方。">
            <DCArtboard id="ctx-open" label="① 初期 = 全員に公開（3 軸すべて空）" width={680} height={900}>
              <ModalShell><AccessPicker initial={window.V_OPEN} /></ModalShell>
            </DCArtboard>
            <DCArtboard id="ctx-filled" label="② 指定公開（5 人 OR 2 グループ OR 1 組織）" width={680} height={1000}>
              <ModalShell><AccessPicker initial={window.V_BALANCED} /></ModalShell>
            </DCArtboard>
          </DCSection>

          {/* 3. マイクロ UX */}
          <DCSection id="micro" title="ピッカー マイクロ UX"
            subtitle="検索 input → 候補ドロップダウン → チップ追加 の各状態。input 下に anchored、最大 10 件。">
            <DCArtboard id="states" label="6 状態 — フォーカス / loading / キーボード / 種別 / 該当なし / エラー" width={820} height={760}>
              <div style={{ width: '100%', height: '100%', background: AC.bg, padding: 22, overflowY: 'auto' }}><MicroStates /></div>
            </DCArtboard>
          </DCSection>

          {/* 4. サマリ表示 */}
          <DCSection id="summary" title="サマリ表示 — AgentsListPane 用 3 フォーマット"
            subtitle="一覧の狭い列 (約 116px)。全員 / 5人 / 5人+2 / 2グループ+1 / 30人 を各案で。">
            <DCArtboard id="fmt1" label="案 1 — 最大軸 + 余り（推奨・最短）" width={460} height={360}>
              <div style={{ width: '100%', height: '100%', background: AC.bg, padding: 20 }}><SummaryTable format={1} /></div>
            </DCArtboard>
            <DCArtboard id="fmt2" label="案 2 — 全軸併記（・区切り）" width={460} height={360}>
              <div style={{ width: '100%', height: '100%', background: AC.bg, padding: 20 }}><SummaryTable format={2} /></div>
            </DCArtboard>
            <DCArtboard id="fmt3" label="案 3 — アイコン + 数字" width={460} height={360}>
              <div style={{ width: '100%', height: '100%', background: AC.bg, padding: 20 }}><SummaryTable format={3} /></div>
            </DCArtboard>
          </DCSection>

          {/* 5. エッジケース */}
          <DCSection id="edges" title="エッジケース"
            subtitle="全員公開 / 1 軸に大量 / バランス型。API エラーと重複防止はマイクロ UX を参照。">
            <DCArtboard id="edge-open" label="3 軸すべて空 = 全員に公開" width={680} height={520}>
              <SectionFrame><AccessPicker initial={window.V_OPEN} /></SectionFrame>
            </DCArtboard>
            <DCArtboard id="edge-many" label="ユーザーだけ 30 人（固定高 + 内部スクロール）" width={680} height={560}>
              <SectionFrame desc="1 軸に大量指定しても破綻しない"><ManyUsers /></SectionFrame>
            </DCArtboard>
          </DCSection>

          {/* 6. 比較と推奨 */}
          <DCSection id="analysis" title="比較と推奨" subtitle="トレードオフ評価と推奨理由・設計メモ">
            <DCArtboard id="compare" label="4 案 トレードオフ比較" width={720} height={460}>
              <div style={{ width: '100%', height: '100%', background: AC.bg, padding: 22, display: 'flex', alignItems: 'center' }}><ComparisonCard /></div>
            </DCArtboard>
            <DCArtboard id="rationale" label="推奨と設計メモ" width={640} height={720}>
              <div style={{ width: '100%', height: '100%', background: AC.bg, padding: 22, overflowY: 'auto' }}><RationaleCard /></div>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
