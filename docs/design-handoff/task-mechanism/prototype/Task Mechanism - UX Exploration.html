<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cowork Agent — タスク(Plan/進捗) UI 検討</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #f0eee9; }
    body { font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif; }
    * { box-sizing: border-box; }
    a { color: #0d9488; }
    a:hover { color: #0a7a70; }
    @keyframes planspin { to { transform: rotate(360deg); } }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: rgba(35,18,0,0.16); border-radius: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    .plan-row { transition: background .2s ease, color .2s ease; }
    .plan-rows::-webkit-scrollbar { width: 6px; }
    .plan-rows::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }

    /* Mock kintone host */
    .kt { width: 100%; height: 100%; display: flex; flex-direction: column; background: #fafbfc; color: #374151; font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; }
    .kt-top { height: 34px; background: #231200; color: #f5e6b8; display: flex; align-items: center; padding: 0 14px; font-size: 11.5px; gap: 14px; flex: 0 0 auto; }
    .kt-logo { display: flex; align-items: center; gap: 6px; font-weight: 700; color: #ffbf00; letter-spacing: .3px; }
    .kt-logo-mark { width: 18px; height: 18px; border-radius: 5px; background: #ffbf00; color: #231200; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; }
    .kt-crumb { flex: 1; color: #9a8f7a; }
    .kt-appbar { height: 48px; background: #fff; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; padding: 0 18px; gap: 12px; flex: 0 0 auto; }
    .kt-app-icon { width: 28px; height: 28px; border-radius: 6px; background: #ffbf00; color: #231200; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; }
    .kt-app-title { font-size: 14px; font-weight: 600; color: #111827; }
    .kt-app-crumb { font-size: 11px; color: #6b7280; }
    .kt-body { flex: 1; display: flex; min-height: 0; }
    .kt-list { flex: 1; padding: 16px 22px; overflow: hidden; background: #fafbfc; }
    .kt-tabs { display: flex; gap: 2px; margin-bottom: 12px; border-bottom: 1px solid #e5e7eb; }
    .kt-tab { padding: 7px 13px; font-size: 11.5px; color: #6b7280; border-bottom: 2px solid transparent; }
    .kt-tab.active { color: #231200; border-bottom-color: #ffbf00; font-weight: 600; }
    .kt-table { width: 100%; border-collapse: collapse; font-size: 11.5px; background: #fff; border: 1px solid #e5e7eb; border-radius: 4px; }
    .kt-table th { background: #f9fafb; color: #6b7280; font-weight: 500; text-align: left; padding: 9px 11px; border-bottom: 1px solid #e5e7eb; font-size: 10.5px; }
    .kt-table td { padding: 10px 11px; border-bottom: 1px solid #f3f4f6; color: #374151; }
    .kt-chip { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 500; }
    .kt-chip.new { background: #fff4c9; color: #8a6400; }
    .kt-chip.pending { background: #f3ead6; color: #231200; }
    .kt-chip.done { background: #231200; color: #ffbf00; }
    .kt-side { width: 384px; height: 100%; border-left: 1px solid #e5e7eb; background: #fff; flex: 0 0 auto; display: flex; flex-direction: column; }
    .solo { width: 384px; height: 720px; overflow: hidden; border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,0.08); border: 1px solid rgba(0,0,0,0.06); }
    .solo-wrap { width: 100%; height: 100%; background: #f0eee9; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="plan-data.jsx"></script>
  <script type="text/babel" src="plan-panel.jsx"></script>

  <script type="text/babel">
    const ACCENT = '#0d9488';

    function MockKintoneHost({ children }) {
      const rows = [
        { id: 'REC-00421', name: '三井商事 受注案件', owner: '田中 美咲', amount: '¥12,400,000', status: 'pending', label: '提案中' },
        { id: 'REC-00420', name: 'パナソニック 保守更新', owner: '佐藤 健一', amount: '¥8,900,000', status: 'done', label: '受注' },
        { id: 'REC-00419', name: 'ソフトバンク SaaS導入', owner: '鈴木 葵', amount: '¥6,200,000', status: 'new', label: '新規' },
        { id: 'REC-00418', name: '楽天 追加開発案件', owner: '山田 拓也', amount: '¥15,800,000', status: 'pending', label: '提案中' },
        { id: 'REC-00417', name: '日立 コンサル契約', owner: '田中 美咲', amount: '¥22,400,000', status: 'done', label: '受注' },
        { id: 'REC-00416', name: 'NTT 保守対応', owner: '中村 玲奈', amount: '¥4,100,000', status: 'new', label: '新規' },
      ];
      return (
        <div className="kt">
          <div className="kt-top">
            <div className="kt-logo"><span className="kt-logo-mark">W</span>Workspace</div>
            <div className="kt-crumb">営業部 › CRM スペース › 案件管理</div>
            <div style={{ fontSize: 11, opacity: 0.7 }}>田中 美咲</div>
          </div>
          <div className="kt-appbar">
            <div className="kt-app-icon">案</div>
            <div>
              <div className="kt-app-title">案件管理</div>
              <div className="kt-app-crumb">レコード一覧 · 342件</div>
            </div>
          </div>
          <div className="kt-body">
            <div className="kt-list">
              <div className="kt-tabs">
                <div className="kt-tab active">すべて</div>
                <div className="kt-tab">自分の担当</div>
                <div className="kt-tab">今月</div>
              </div>
              <table className="kt-table">
                <thead>
                  <tr><th>レコードNo.</th><th>案件名</th><th>担当者</th><th>受注金額</th><th>ステータス</th></tr>
                </thead>
                <tbody>
                  {rows.map((r) => (
                    <tr key={r.id}>
                      <td style={{ color: '#6b7280', fontFamily: 'JetBrains Mono, monospace', fontSize: 10.5 }}>{r.id}</td>
                      <td style={{ fontWeight: 500 }}>{r.name}</td>
                      <td>{r.owner}</td>
                      <td style={{ fontVariantNumeric: 'tabular-nums' }}>{r.amount}</td>
                      <td><span className={'kt-chip ' + r.status}>{r.label}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            {children}
          </div>
        </div>
      );
    }

    // solo フレーム (384×720 パネル単体)
    function Solo({ children }) {
      return <div className="solo-wrap"><div className="solo">{children}</div></div>;
    }

    // 状態ラベルの小さな注記チップ
    function StateTag({ children }) {
      return (
        <div style={{
          position: 'absolute', top: 12, left: 12, zIndex: 5,
          fontSize: 10.5, fontFamily: '"JetBrains Mono", monospace',
          background: '#231200', color: '#ffbf00', padding: '3px 8px', borderRadius: 5,
        }}>{children}</div>
      );
    }

    // ── 仕様まとめカード ──
    function SpecCard() {
      const wrap = { width: '100%', height: '100%', background: '#faf8f3', padding: '30px 34px', overflow: 'auto', boxSizing: 'border-box', color: '#231200', fontSize: 12.5, lineHeight: 1.7 };
      const sec = { marginBottom: 20 };
      const h = { fontSize: 11, fontWeight: 700, letterSpacing: 0.8, textTransform: 'uppercase', color: '#6b5f4a', marginBottom: 8 };
      const row = { display: 'flex', gap: 10, padding: '5px 0', borderBottom: '1px dashed rgba(35,18,0,0.10)' };
      const k = { flex: '0 0 118px', color: '#6b5f4a', fontFamily: '"JetBrains Mono", monospace', fontSize: 11 };
      const v = { flex: 1, color: '#231200' };
      return (
        <div style={wrap}>
          <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 4, letterSpacing: -0.3 }}>PlanPanel · 仕様</div>
          <div style={{ fontSize: 12, color: '#6b5f4a', marginBottom: 22 }}>進捗チェックリスト帯 — WorkflowFooter の step 語彙を縦リスト化</div>

          <div style={sec}>
            <div style={h}>配置</div>
            <div style={row}><span style={k}>層</span><span style={v}>メッセージ一覧の下・Composer の上（scroll コンテナの外＝ピン留め）</span></div>
            <div style={row}><span style={k}>幅</span><span style={v}>Chat Panel 幅に追従（~360〜420px）</span></div>
            <div style={row}><span style={k}>plan 無し</span><span style={v}>帯ごと非表示（<code>todos.length === 0 → null</code>）</span></div>
          </div>

          <div style={sec}>
            <div style={h}>行の状態</div>
            <div style={row}><span style={k}>pending</span><span style={v}>13px 中空円（1.5px <code>--cw-border</code>）+ <code>content</code>（subtle）</span></div>
            <div style={row}><span style={k}>in_progress</span><span style={v}>15px spinner（accent）+ <code>activeForm</code>（text/600）+ accentSoft 地 + 実行中 pill</span></div>
            <div style={row}><span style={k}>completed</span><span style={v}>16px accentSoft 円 + accent ✓ + <code>content</code>（muted・済感）</span></div>
          </div>

          <div style={sec}>
            <div style={h}>ヘッダ</div>
            <div style={row}><span style={k}>実行中</span><span style={v}>spinner + 「作業を実行中」 + <code>3 / 6</code> + 44px ミニバー</span></div>
            <div style={row}><span style={k}>畳んだ時</span><span style={v}>タイトルを現在の <code>activeForm</code> に差し替え（何を実行中か残す）</span></div>
            <div style={row}><span style={k}>全完了</span><span style={v}>teal ✓ + 「作業が完了しました」（既定で畳む・コンパクト終端）</span></div>
          </div>

          <div style={sec}>
            <div style={h}>寸法 / トークン</div>
            <div style={row}><span style={k}>行</span><span style={v}>padding 5/8 · gap 9 · radius 8 · font 12.5</span></div>
            <div style={row}><span style={k}>アイコン枠</span><span style={v}>18px スロット</span></div>
            <div style={row}><span style={k}>accent</span><span style={v}><code>--cw-accent #0d9488</code>（teal）</span></div>
            <div style={row}><span style={k}>行リスト</span><span style={v}>max-height 216px（超過でスクロール）</span></div>
          </div>

          <div style={sec}>
            <div style={h}>長い plan の工夫</div>
            <div style={row}><span style={k}>条件</span><span style={v}><code>total &gt; 6 &amp;&amp; completed ≥ 2</code></span></div>
            <div style={row}><span style={k}>挙動</span><span style={v}>完了行を「N 件完了 ▾」に畳み、in_progress + pending のみ展開</span></div>
          </div>

          <div style={sec}>
            <div style={h}>完了表現の棲み分け</div>
            <div style={row}><span style={k}>PlanPanel</span><span style={v}>teal・帯内でコンパクト（＝plan が済んだ）</span></div>
            <div style={row}><span style={k}>応答完了 divider</span><span style={v}>emerald・会話内の中央 divider（＝応答が済んだ）別レイヤ・別色で非競合</span></div>
          </div>
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas>
          <DCSection id="overview" title="PlanPanel（進捗チェックリスト）"
            subtitle="1 セッションのゴール到達までを 計画 → 進捗 → 完了 で可視化する ピン留め帯 · #128">

            <DCArtboard id="inhost" label="ホスト統合 · 進行中（主状態）" width={1180} height={760}>
              <MockKintoneHost>
                <div className="kt-side">
                  <ChatShell todos={PLAN_STATES.mid} accent={ACCENT} />
                </div>
              </MockKintoneHost>
            </DCArtboard>

            <DCArtboard id="solo-mid" label="パネル単体 · 進行中" width={430} height={780}>
              <Solo><ChatShell todos={PLAN_STATES.mid} accent={ACCENT} /></Solo>
            </DCArtboard>

            <DCArtboard id="live" label="ライブ · 状態遷移のトランジション" width={430} height={520}>
              <div className="solo-wrap">
                <div style={{ width: 384, height: 440, overflow: 'hidden', borderRadius: 12, boxShadow: '0 8px 40px rgba(0,0,0,0.08)', border: '1px solid rgba(0,0,0,0.06)' }}>
                  <PlanPanelLive base={PLAN_REPORT} accent={ACCENT} />
                </div>
              </div>
            </DCArtboard>

            <DCPostIt top={30} left={-186} rotate={-3} width={166}>
              会話はスクロールしても plan は見え続ける（scroll コンテナの外）。主役はあくまで会話。
            </DCPostIt>
          </DCSection>

          <DCSection id="states" title="状態バリエーション"
            subtitle="1 非表示 / 2 開始直後 / 3 進行中 / 4 全完了 / 5 長い plan">

            <DCArtboard id="s1-none" label="1 · plan 無し → 非表示" width={430} height={780}>
              <Solo>
                <div style={{ position: 'relative', width: '100%', height: '100%' }}>
                  <StateTag>todos = []</StateTag>
                  <ChatShell todos={PLAN_STATES.none} accent={ACCENT} history={[
                    { kind: 'user', text: 'この案件の担当者は誰？' },
                    { kind: 'agent', text: '「三井商事 受注案件」の担当者は 田中 美咲 さんです。' },
                  ]} />
                </div>
              </Solo>
            </DCArtboard>

            <DCArtboard id="s2-start" label="2 · 開始直後（全 pending / 先頭 in_progress）" width={430} height={780}>
              <Solo>
                <div style={{ position: 'relative', width: '100%', height: '100%' }}>
                  <StateTag>0 / 6</StateTag>
                  <ChatShell todos={PLAN_STATES.start} accent={ACCENT} />
                </div>
              </Solo>
            </DCArtboard>

            <DCArtboard id="s3-mid" label="3 · 進行中（主状態）" width={430} height={780}>
              <Solo>
                <div style={{ position: 'relative', width: '100%', height: '100%' }}>
                  <StateTag>3 / 6</StateTag>
                  <ChatShell todos={PLAN_STATES.mid} accent={ACCENT} />
                </div>
              </Solo>
            </DCArtboard>

            <DCArtboard id="s4-done" label="4 · 全完了（既定で畳む・応答完了 divider と同居）" width={430} height={780}>
              <Solo>
                <div style={{ position: 'relative', width: '100%', height: '100%' }}>
                  <StateTag>6 / 6</StateTag>
                  <ChatShell todos={PLAN_STATES.done} accent={ACCENT} showDoneDivider history={[
                    ...CHAT_HISTORY,
                    { kind: 'agent', text: 'レポートを作成し、Slack #営業-レポート に送信しました。' },
                  ]} />
                </div>
              </Solo>
            </DCArtboard>

            <DCArtboard id="s4-done-open" label="4b · 全完了を展開したところ" width={430} height={780}>
              <Solo>
                <div style={{ position: 'relative', width: '100%', height: '100%' }}>
                  <StateTag>6 / 6 · 展開</StateTag>
                  <ChatShell todos={PLAN_STATES.done} accent={ACCENT} defaultCollapsed={false} showDoneDivider history={[
                    ...CHAT_HISTORY,
                    { kind: 'agent', text: 'レポートを作成し、Slack #営業-レポート に送信しました。' },
                  ]} />
                </div>
              </Solo>
            </DCArtboard>

            <DCArtboard id="s5-long" label="5 · 長い plan（10件・完了分を畳む）" width={430} height={780}>
              <Solo>
                <div style={{ position: 'relative', width: '100%', height: '100%' }}>
                  <StateTag>5 / 10</StateTag>
                  <ChatShell todos={PLAN_STATES.long} accent={ACCENT} history={[
                    { kind: 'user', text: '案件管理アプリのデータをクリーニングして、重複や表記ゆれを直して。' },
                    { kind: 'agent', text: 'データ整備を進めます。まず現状のスキーマと重複を確認します。' },
                  ]} />
                </div>
              </Solo>
            </DCArtboard>

            <DCPostIt top={30} left={-206} rotate={2} width={186}>
              in_progress は常に 1 つが基本。「〜中」の現在進行形（activeForm）で、内部処理名は出さない。
            </DCPostIt>
          </DCSection>

          <DCSection id="collapsed" title="折りたたみ / まとめ"
            subtitle="幅が狭いのでヘッダだけ残して畳める。畳んでも現在の作業は分かる">

            <DCArtboard id="collapsed-mid" label="進行中を畳んだ状態" width={430} height={780}>
              <Solo>
                <div style={{ position: 'relative', width: '100%', height: '100%' }}>
                  <StateTag>畳み · 実行中</StateTag>
                  <ChatShell todos={PLAN_STATES.mid} accent={ACCENT} defaultCollapsed />
                </div>
              </Solo>
            </DCArtboard>

            <DCArtboard id="spec" label="仕様まとめ" width={540} height={780}>
              <SpecCard />
            </DCArtboard>

            <DCPostIt top={30} left={-206} rotate={-2} width={186}>
              畳むとタイトルが現在の activeForm に切り替わる。行クリックの挙動は無し（表示専用）。
            </DCPostIt>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
