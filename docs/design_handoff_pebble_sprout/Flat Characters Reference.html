<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Flat Character Explorations — Cowork Agent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: 'Noto Sans JP', 'Inter', sans-serif;
      color: #231200; background: #f0eee9;
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="flat-characters.jsx"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const ART_WIDTH = 760;
    const ART_HEIGHT = 480;

    function App() {
      return (
        <DesignCanvas
          title="Flat Character Explorations"
          subtitle="Cowork Agent for kintone — シンプルでフラットなキャラクター案 8種"
          background="#f0eee9"
        >
          <DCSection id="hybrid" title="0. ハイブリッド案 — Pebble × Sprout（teal主役）">
            <DCArtboard id="pebble-sprout" label="Pebble Sprout" width={760} height={520}>
              <CharCard
                Component={PebbleSproutBot}
                label="Pebble Sprout"
                blurb="Pebbleの角丸スクエアの安定感に、Sproutの二葉を頭に載せたハイブリッド。カラーは Sprout 側に寄せて teal主役・cream表情・amberアクセント。頬の amber ドットでブランドカラーとも繋ぎ、状態によって葉が傾いたり完了時にスパークルが咲く。"
                paletteChips={['#0d9488', '#faf2dc', '#ffbf00']}
                line="新しいアプリを一緒に育てていきましょう。準備ができたら声をかけてください。"
              />
            </DCArtboard>
          </DCSection>

          <DCSection id="primary" title="1. プライマリ案（kintone文脈との親和性）">
            <DCArtboard id="cloud" label="Cloud — kintone雲ロゴ直系" width={ART_WIDTH} height={ART_HEIGHT}>
              <CharCard
                Component={CloudBot}
                label="Cloud"
                blurb="kintone のロゴ（雲＋黄色）からそのまま派生。横長シルエットでチャットアバターでも識別しやすい。3つの円＋角丸長方形だけ、余計な装飾なし。"
                paletteChips={['#ffbf00', '#231200']}
                line="kintoneのアプリと同じ雰囲気で、すぐに『内蔵された機能』として馴染みます。"
              />
            </DCArtboard>

            <DCArtboard id="stamp" label="Stamp — 印鑑モチーフ" width={ART_WIDTH} height={ART_HEIGHT}>
              <CharCard
                Component={StampBot}
                label="Stamp"
                blurb="日本のオフィス文化と直結する印鑑シルエット。『承認・押印』というメタファーは Cowork Agent のHITL（破壊的操作の承認待ち）機能とも自然に重なる。"
                paletteChips={['#231200', '#faf2dc']}
                line="47件の更新を準備しました。押印いただければ実行します。"
              />
            </DCArtboard>

            <DCArtboard id="bean" label="Bean — 一筆書き" width={ART_WIDTH} height={ART_HEIGHT}>
              <CharCard
                Component={BeanBot}
                label="Bean"
                blurb="ソラマメ型の有機的シルエット。ピクセルロボより親しみやすく、業務ツールに『人間らしさ』を一滴足したいときの選択肢。"
                paletteChips={['#ffbf00', '#231200']}
                line="お疲れ様です。今日のタスクを一緒に片付けましょうか。"
              />
            </DCArtboard>
          </DCSection>

          <DCSection id="japanese" title="2. 和のモチーフ案">
            <DCArtboard id="origami" label="Origami — 折り鶴" width={ART_WIDTH} height={ART_HEIGHT}>
              <CharCard
                Component={OrigamiBot}
                label="Origami"
                blurb="折り紙の鶴。『一枚の紙からあらゆる業務を組み立てる』という Agent のメタファー。三角形だけで構成された極限のフラット。"
                paletteChips={['#ffbf00', '#231200']}
                line="アプリ構成を組み立てています。少々お待ちください。"
              />
            </DCArtboard>

            <DCArtboard id="pin" label="Pin — 付箋・しおり" width={ART_WIDTH} height={ART_HEIGHT}>
              <CharCard
                Component={PinBot}
                label="Pin"
                blurb="付箋／しおりの形。『情報を貼って整理する』という業務ツールの根本機能を擬人化。シルエットがチャットの吹き出しとも親和。"
                paletteChips={['#ffbf00', '#faf2dc', '#231200']}
                line="このレコードに『要確認』のメモを貼りますか？"
              />
            </DCArtboard>
          </DCSection>

          <DCSection id="abstract" title="3. 抽象・象徴案">
            <DCArtboard id="pebble" label="Pebble — 角丸スクエア" width={ART_WIDTH} height={ART_HEIGHT}>
              <CharCard
                Component={PebbleBot}
                label="Pebble"
                blurb="iOS/Slack的な角丸スクエア。一番無難で、どんなUIにも馴染む。表情だけで状態を伝えるミニマル設計。"
                paletteChips={['#ffbf00', '#231200']}
                line="集計が完了しました。担当者ごとの結果を表示します。"
                palette={['amber', 'charcoal']}
              />
            </DCArtboard>

            <DCArtboard id="sprout" label="Sprout — 新芽" width={ART_WIDTH} height={ART_HEIGHT}>
              <CharCard
                Component={SproutBot}
                label="Sprout"
                blurb="二葉の新芽。teal を主役に、kintone の『業務を育てる』というブランドメッセージと結びつく。amberアクセントで全体のトーンも保つ。"
                paletteChips={['#0d9488', '#faf2dc', '#ffbf00']}
                line="新しいアプリを一緒に育てていきましょう。"
              />
            </DCArtboard>

            <DCArtboard id="drop" label="Drop — 雫" width={ART_WIDTH} height={ART_HEIGHT}>
              <CharCard
                Component={DropBot}
                label="Drop"
                blurb="雫＝吹き出しの兼用シルエット。ハイライトの曲線が amber で『話している』感を持たせる。チャット文脈で最も自然。"
                paletteChips={['#231200', '#ffbf00', '#faf2dc']}
                line="ご質問ありがとうございます。少しお調べします。"
              />
            </DCArtboard>
          </DCSection>

          <DCSection id="notes" title="4. 設計メモ">
            <DCArtboard id="principles" label="共通原則" width={ART_WIDTH} height={ART_HEIGHT}>
              <div style={{ padding: 32, fontFamily: "'Noto Sans JP', sans-serif", color: '#231200', lineHeight: 1.7 }}>
                <div style={{ fontFamily: "'Press Start 2P', monospace", fontSize: 14, marginBottom: 16 }}>
                  Design Principles
                </div>
                <ul style={{ fontSize: 13, paddingLeft: 18, margin: 0 }}>
                  <li><b>2〜3色のみ</b>。amber / charcoal / cream を基調、teal は1案のみ。</li>
                  <li><b>輪郭線なし</b>。塗りのシルエットだけで成立させる（Origamiの折り目を除く）。</li>
                  <li><b>表情は5種で統一</b>：●● / ・・・ / ▭▭ / ●●＋口 / ◡◡ 。シルエットを変えずに状態を切替。</li>
                  <li><b>ピクセル版（Archibo）と共存可</b>：開発者向けの場面ではピクセル、エンドユーザー向けはフラット、と使い分け。</li>
                  <li><b>サイズ耐性</b>：チャットアバター（24px）でも識別できるシルエットを優先。</li>
                </ul>

                <div style={{ fontFamily: "'Press Start 2P', monospace", fontSize: 14, margin: '24px 0 12px' }}>
                  Recommendation
                </div>
                <p style={{ fontSize: 13, margin: 0 }}>
                  <b>Cloud</b> がブランドアラインメントとして最も自然。<b>Stamp</b> は HITL/承認フローを強調したい場合の独自性ある選択肢。
                  どちらかを軸に、もう1〜2案を「シーズナル / イベント時の表情違い」として残すのが現実的です。
                </p>

                <div style={{ marginTop: 24, padding: 14, background: '#fff8e6', borderRadius: 8, fontSize: 12, color: '#6b5f4a' }}>
                  次のステップ：気に入った案を1〜2つ選んでいただければ、(1) サイズバリエーション（16/24/40/96px）、(2) アニメーション（瞬き・呼吸）、(3) チャットパネルへの組み込み、まで進めます。
                </div>
              </div>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
