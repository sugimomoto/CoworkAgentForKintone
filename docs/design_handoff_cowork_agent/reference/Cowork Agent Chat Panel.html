<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Cowork Agent for kintone — チャットUI プロトタイプ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #f0eee9; }
    body { font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif; }

    /* Mock kintone host shell — just enough visual context that the panel
       feels like it's living inside an app, NOT a full app recreation. */
    .host {
      width: 100%; height: 100%;
      background: #fff;
      display: flex; flex-direction: column;
      font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
      color: #374151;
    }
    .host-top {
      height: 38px; background: #231200; color: #f5e6b8;
      display: flex; align-items: center; padding: 0 14px;
      font-size: 12px; gap: 14px; flex: 0 0 auto;
    }
    .host-logo {
      display: flex; align-items: center; gap: 6px;
      font-weight: 700; letter-spacing: 0.3px; color: #ffbf00;
    }
    .host-logo-mark {
      width: 20px; height: 18px; border-radius: 50%;
      background: #ffbf00;
      display: flex; align-items: center; justify-content: center;
      color: #231200; font-size: 10px; font-weight: 800;
      position: relative;
    }
    .host-logo-mark::before {
      content: ''; position: absolute; left: -4px; top: 4px;
      width: 8px; height: 8px; border-radius: 50%; background: #ffbf00;
    }
    .host-logo-mark::after {
      content: ''; position: absolute; right: -3px; top: 6px;
      width: 7px; height: 7px; border-radius: 50%; background: #ffbf00;
    }
    .host-breadcrumb {
      flex: 1; color: #9ca3af; display: flex; align-items: center; gap: 8px;
    }
    .host-appbar {
      height: 52px; background: #fff; border-bottom: 1px solid #e5e7eb;
      display: flex; align-items: center; padding: 0 20px; gap: 14px;
      flex: 0 0 auto;
    }
    .host-app-icon {
      width: 32px; height: 32px; border-radius: 6px;
      background: linear-gradient(135deg, #ffd451, #ffbf00);
      display: flex; align-items: center; justify-content: center;
      color: #231200; font-size: 15px; font-weight: 700;
    }
    .host-app-title { font-size: 15px; font-weight: 600; color: #111827; }
    .host-app-crumb { font-size: 12px; color: #6b7280; }
    .host-toolbar {
      margin-left: auto; display: flex; gap: 8px;
    }
    .host-btn {
      padding: 6px 12px; font-size: 12px; border-radius: 4px;
      border: 1px solid #d1d5db; background: #fff; color: #374151; cursor: pointer;
      font-family: inherit;
    }
    .host-btn.primary { background: #ffbf00; color: #231200; border-color: #f0b400; font-weight: 600; }
    .host-body { flex: 1; display: flex; min-height: 0; }
    .host-list {
      flex: 1; padding: 18px 24px; overflow: auto; background: #fafbfc;
    }
    .host-view-tabs {
      display: flex; gap: 2px; margin-bottom: 14px; border-bottom: 1px solid #e5e7eb;
    }
    .host-tab {
      padding: 8px 14px; font-size: 12px; color: #6b7280;
      border-bottom: 2px solid transparent; cursor: pointer;
    }
    .host-tab.active { color: #231200; border-bottom-color: #ffbf00; font-weight: 600; }
    .host-table {
      width: 100%; border-collapse: collapse; font-size: 12px;
      background: #fff; border: 1px solid #e5e7eb; border-radius: 4px;
    }
    .host-table th {
      background: #f9fafb; color: #6b7280; font-weight: 500;
      text-align: left; padding: 10px 12px; border-bottom: 1px solid #e5e7eb;
      font-size: 11px;
    }
    .host-table td {
      padding: 11px 12px; border-bottom: 1px solid #f3f4f6; color: #374151;
    }
    .host-table tr:hover td { background: #fafbfc; }
    .host-chip {
      display: inline-block; padding: 2px 8px; border-radius: 3px;
      font-size: 10.5px; font-weight: 500;
    }
    .host-chip.new { background: #fff4c9; color: #8a6400; }
    .host-chip.pending { background: #f3ead6; color: #231200; }
    .host-chip.done { background: #231200; color: #ffbf00; }

    /* The side panel where our agent lives */
    .host-sidepanel {
      width: var(--panel-w, 380px);
      height: 100%;
      border-left: 1px solid #e5e7eb;
      background: #fff;
      flex: 0 0 auto;
      display: flex; flex-direction: column;
    }

    /* Artboard content — lets the phone/app frame be full height */
    .artboard-fill {
      width: 100%; height: 100%; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .standalone-panel {
      width: 380px; height: 720px;
      display: flex; flex-direction: column;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
      border-radius: 12px; overflow: hidden;
      border: 1px solid rgba(0,0,0,0.06);
    }

    /* Tweaks panel */
    .tweaks-panel {
      position: fixed; bottom: 20px; right: 20px; z-index: 200;
      width: 280px; background: #1a1d23; color: #e5e7eb;
      border-radius: 12px; padding: 14px 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      font-size: 12px;
    }
    .tweaks-panel h3 {
      margin: 0 0 12px; font-size: 13px; font-weight: 600;
      display: flex; align-items: center; gap: 6px;
    }
    .tweaks-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px; gap: 10px;
    }
    .tweaks-row label { color: #9ca3af; font-size: 11.5px; }
    .tweaks-swatches { display: flex; gap: 5px; }
    .tweaks-swatch {
      width: 20px; height: 20px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: transform .1s;
    }
    .tweaks-swatch.active { border-color: #fff; transform: scale(1.1); }
    .tweaks-select {
      background: #2a2f38; color: #e5e7eb; border: 1px solid #3a3f48;
      border-radius: 6px; padding: 3px 8px; font-size: 11.5px; font-family: inherit;
    }
    .tweaks-toggle {
      width: 32px; height: 18px; border-radius: 9px; background: #3a3f48;
      position: relative; cursor: pointer; transition: background .2s;
    }
    .tweaks-toggle.on { background: #60a5fa; }
    .tweaks-toggle::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px; border-radius: 50%; background: #fff;
      transition: left .2s;
    }
    .tweaks-toggle.on::after { left: 16px; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>
    // Tweakable defaults — the host can rewrite this block.
    window.__TWEAKS = /*EDITMODE-BEGIN*/{
      "accent_minimal": "#231200",
      "accent_rich": "#0d9488",
      "accent_terminal": "#a3e635",
      "theme": "light",
      "density": "airy"
    }/*EDITMODE-END*/;
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="variant-rich.jsx"></script>

  <script type="text/babel">
    // ────────────────────────────────────────────────────────
    // Mock kintone host — record list context for the side panel.
    // Not a real kintone clone; just enough to anchor the agent visually.
    // ────────────────────────────────────────────────────────
    function MockKintoneHost({ children, compact }) {
      const rows = [
        { id: 'REC-00421', name: '三井商事 受注案件', owner: '田中 美咲', amount: '¥12,400,000', date: '2026-04-18', status: 'pending', label: '提案中' },
        { id: 'REC-00420', name: 'パナソニック 保守更新', owner: '佐藤 健一', amount: '¥8,900,000', date: '2026-04-18', status: 'done', label: '受注' },
        { id: 'REC-00419', name: 'ソフトバンク SaaS導入', owner: '鈴木 葵', amount: '¥6,200,000', date: '2026-04-17', status: 'new', label: '新規' },
        { id: 'REC-00418', name: '楽天 追加開発案件', owner: '山田 拓也', amount: '¥15,800,000', date: '2026-04-17', status: 'pending', label: '提案中' },
        { id: 'REC-00417', name: '日立 コンサル契約', owner: '田中 美咲', amount: '¥22,400,000', date: '2026-04-16', status: 'done', label: '受注' },
        { id: 'REC-00416', name: 'NTT 保守対応', owner: '中村 玲奈', amount: '¥4,100,000', date: '2026-04-16', status: 'new', label: '新規' },
        { id: 'REC-00415', name: 'キヤノン システム更改', owner: '佐藤 健一', amount: '¥18,200,000', date: '2026-04-15', status: 'pending', label: '提案中' },
        { id: 'REC-00414', name: 'コスモ石油 案件相談', owner: '小林 大輔', amount: '—', date: '2026-04-15', status: 'new', label: '新規' },
        { id: 'REC-00413', name: '東京海上 定期更新', owner: '田中 美咲', amount: '¥9,600,000', date: '2026-04-14', status: 'done', label: '受注' },
      ];
      return (
        <div className="host">
          <div className="host-top">
            <div className="host-logo"><span className="host-logo-mark">W</span>Workspace</div>
            <div className="host-breadcrumb">
              <span>営業部</span> <span style={{ opacity: 0.5 }}>›</span>
              <span>CRM スペース</span> <span style={{ opacity: 0.5 }}>›</span>
              <span style={{ color: '#fff' }}>案件管理</span>
            </div>
            <div style={{ fontSize: 11, opacity: 0.6 }}>田中 美咲</div>
          </div>
          <div className="host-appbar">
            <div className="host-app-icon">案</div>
            <div>
              <div className="host-app-title">案件管理</div>
              <div className="host-app-crumb">レコード一覧 · 342件</div>
            </div>
            <div className="host-toolbar">
              <button className="host-btn">絞り込み</button>
              <button className="host-btn">CSV</button>
              <button className="host-btn primary">＋ レコード追加</button>
            </div>
          </div>
          <div className="host-body">
            <div className="host-list">
              <div className="host-view-tabs">
                <div className="host-tab active">すべて</div>
                <div className="host-tab">自分の担当</div>
                <div className="host-tab">今月</div>
                <div className="host-tab">未対応</div>
              </div>
              <table className="host-table">
                <thead>
                  <tr>
                    <th>レコードNo.</th>
                    <th>案件名</th>
                    <th>担当者</th>
                    <th>受注金額</th>
                    <th>受注日</th>
                    <th>ステータス</th>
                  </tr>
                </thead>
                <tbody>
                  {rows.slice(0, compact ? 5 : rows.length).map((r) => (
                    <tr key={r.id}>
                      <td style={{ color: '#6b7280', fontFamily: 'JetBrains Mono, monospace', fontSize: 11 }}>{r.id}</td>
                      <td style={{ fontWeight: 500 }}>{r.name}</td>
                      <td>{r.owner}</td>
                      <td style={{ fontVariantNumeric: 'tabular-nums' }}>{r.amount}</td>
                      <td style={{ color: '#6b7280' }}>{r.date}</td>
                      <td><span className={'host-chip ' + r.status}>{r.label}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            {children}
          </div>
        </div>
      );
    }

    // Side-panel wrapper that sets CSS var for panel width
    function SidePanel({ children }) {
      return (
        <div className="host-sidepanel">
          {children}
        </div>
      );
    }

    // ────────────────────────────────────────────────────────
    // HITL-only previews — one card per variant showing the destructive
    // update approval moment, isolated from the main scenario.
    // ────────────────────────────────────────────────────────
    function HitlPreview({ variant, accent, dark }) {
      const msg = { kind: 'plan', ...SCENARIO.hitl.plan };
      const userMsg = { kind: 'user', text: SCENARIO.hitl.userQuery };
      const agentMsg = { kind: 'agent', text: '影響範囲を計算しました。破壊的操作のため承認をお願いします。' };

      if (variant === 'minimal') {
        const c = minimalColors(dark, accent);
        return (
          <div className="panel" style={{ width: '100%', height: '100%', display: 'flex', flexDirection: 'column', background: c.bg, color: c.text }}>
            <MinimalHeader c={c} />
            <div className="chat-scroll" style={{ flex: 1, overflowY: 'auto', padding: '16px 18px', display: 'flex', flexDirection: 'column', gap: 16 }}>
              <MinimalMessage m={userMsg} c={c} accent={accent} />
              <MinimalMessage m={agentMsg} c={c} accent={accent} />
              <div style={{
                border: `2px solid ${c.warn || '#f59e0b'}55`, borderRadius: 12,
                background: c.card, padding: 14, position: 'relative',
                boxShadow: `0 0 0 6px ${(c.warn || '#f59e0b')}12`,
              }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
                  <div style={{
                    width: 20, height: 20, borderRadius: 6, background: '#fef3c7', color: '#b45309',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                  }}>
                    <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M7 1l6 11H1L7 1z"/><path d="M7 5v3M7 10h.01"/></svg>
                  </div>
                  <div style={{ fontSize: 12.5, fontWeight: 600, color: c.text }}>{msg.title}</div>
                  <span style={{ marginLeft: 'auto', fontSize: 10, padding: '2px 7px', borderRadius: 4, background: '#fef3c7', color: '#b45309', fontWeight: 600 }}>
                    要承認
                  </span>
                </div>
                <div style={{
                  background: '#fef9e7', border: '1px solid #fcd34d55', borderRadius: 8, padding: '8px 10px', marginBottom: 10,
                  display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 4, fontSize: 11,
                }}>
                  <div><span style={{ color: c.muted }}>対象: </span><span style={{ color: c.text, fontWeight: 500 }}>{msg.impact.app}</span></div>
                  <div><span style={{ color: c.muted }}>件数: </span><span style={{ color: c.text, fontWeight: 600 }}>{msg.impact.records}件</span></div>
                  <div><span style={{ color: c.muted }}>フィールド: </span><span style={{ color: c.text }}>{msg.impact.field}</span></div>
                  <div><span style={{ color: c.muted }}>取消: </span><span style={{ color: '#047857' }}>可能</span></div>
                </div>
                <ol style={{ margin: 0, padding: 0, listStyle: 'none' }}>
                  {msg.steps.map((s, i) => (
                    <li key={i} style={{ display: 'flex', gap: 8, padding: '4px 0', fontSize: 12, color: c.text, lineHeight: 1.5 }}>
                      <span style={{ flex: '0 0 18px', color: c.subtle, fontSize: 10, fontFamily: '"JetBrains Mono", monospace', paddingTop: 2 }}>{String(i + 1).padStart(2, '0')}</span>
                      <span>{s.text}</span>
                    </li>
                  ))}
                </ol>
                <div style={{ display: 'flex', gap: 6, marginTop: 12 }}>
                  <button style={{
                    flex: 1, padding: '9px 12px', fontSize: 12.5, fontWeight: 600,
                    background: '#b45309', color: '#fff', border: 'none', borderRadius: 8,
                    cursor: 'pointer', fontFamily: 'inherit',
                  }}>承認して実行</button>
                  <button style={{
                    padding: '9px 12px', fontSize: 12.5, background: 'transparent',
                    color: c.muted, border: `1px solid ${c.border}`, borderRadius: 8,
                    cursor: 'pointer', fontFamily: 'inherit',
                  }}>キャンセル</button>
                </div>
              </div>
            </div>
            <MinimalComposer c={c} accent={accent} />
          </div>
        );
      }

      if (variant === 'rich') {
        const c = richColors(dark, accent);
        const plan = { kind: 'plan', ...SCENARIO.hitl.plan };
        return (
          <div className="panel" style={{ width: '100%', height: '100%', display: 'flex', flexDirection: 'column', background: c.bg, color: c.text, position: 'relative' }}>
            <div className="aura" style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }} />
            <RichHeader c={c} accent={accent} />
            <div className="chat-scroll" style={{ flex: 1, overflowY: 'auto', padding: '16px', display: 'flex', flexDirection: 'column', gap: 14, position: 'relative', zIndex: 1 }}>
              <RichMessage m={userMsg} c={c} accent={accent} />
              <RichMessage m={agentMsg} c={c} accent={accent} />
              <RichMessage m={plan} c={c} accent={accent} />
            </div>
            <RichComposer c={c} accent={accent} />
          </div>
        );
      }

      // terminal
      const c = termColors(dark, accent);
      const plan = { kind: 'plan', ...SCENARIO.hitl.plan };
      return (
        <div className="panel term" style={{ width: '100%', height: '100%', display: 'flex', flexDirection: 'column', background: c.bg, color: c.text, position: 'relative', overflow: 'hidden' }}>
          <div style={{
            position: 'absolute', inset: 0, pointerEvents: 'none', zIndex: 10, opacity: 0.35,
            backgroundImage: `repeating-linear-gradient(0deg, transparent 0, transparent 3px, rgba(255,255,255,0.015) 3px, rgba(255,255,255,0.015) 4px)`,
          }} />
          <TermHeader c={c} accent={accent} />
          <div className="chat-scroll" style={{ flex: 1, overflowY: 'auto', padding: '10px 14px', display: 'flex', flexDirection: 'column', gap: 8, position: 'relative', zIndex: 1 }}>
            <TermMessage m={userMsg} c={c} accent={accent} />
            <TermMessage m={agentMsg} c={c} accent={accent} />
            <TermMessage m={plan} c={c} accent={accent} />
            <div style={{ display: 'flex', gap: 6, marginTop: 4 }}>
              <button style={{
                flex: 1, padding: '6px 10px', fontSize: 11.5, fontWeight: 600,
                background: c.warn, color: '#fff', border: `1px solid ${c.warn}`,
                cursor: 'pointer', fontFamily: 'inherit',
              }}>[y] 承認</button>
              <button style={{
                padding: '6px 10px', fontSize: 11.5, background: 'transparent',
                color: c.text, border: `1px solid ${c.cardBorder}`,
                cursor: 'pointer', fontFamily: 'inherit',
              }}>[n] 拒否</button>
              <button style={{
                padding: '6px 10px', fontSize: 11.5, background: 'transparent',
                color: c.muted, border: `1px solid ${c.cardBorder}`,
                cursor: 'pointer', fontFamily: 'inherit',
              }}>[e] 編集</button>
            </div>
          </div>
          <TermComposer c={c} accent={accent} />
        </div>
      );
    }

    // ────────────────────────────────────────────────────────
    // Tweaks floating panel
    // ────────────────────────────────────────────────────────
    const ACCENT_OPTIONS = {
      minimal: ['#ffbf00', '#d97706', '#231200', '#0ea5e9', '#14b8a6'],
      rich:    ['#0d9488', '#059669', '#d97706', '#ffbf00', '#231200'],
      terminal:['#ffbf00', '#fbbf24', '#5eead4', '#a3e635', '#f472b6'],
    };

    function TweakPanel({ visible, tweaks, setTweaks }) {
      if (!visible) return null;
      const set = (k, v) => {
        const next = { ...tweaks, [k]: v };
        setTweaks(next);
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
      };
      return (
        <div className="tweaks-panel">
          <h3>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.6"><circle cx="7" cy="7" r="5.5"/><path d="M7 4v3l2 1.5"/></svg>
            Tweaks
          </h3>
          <div className="tweaks-row">
            <label>テーマ</label>
            <div className="tweaks-toggle" onClick={() => set('theme', tweaks.theme === 'dark' ? 'light' : 'dark')}
              {...(tweaks.theme === 'dark' ? { className: 'tweaks-toggle on' } : {})}>
            </div>
          </div>
          <div className="tweaks-row">
            <label>情報密度</label>
            <select className="tweaks-select" value={tweaks.density} onChange={(e) => set('density', e.target.value)}>
              <option value="compact">コンパクト</option>
              <option value="comfortable">標準</option>
              <option value="airy">ゆったり</option>
            </select>
          </div>
          <div style={{ margin: '12px 0 6px', height: 1, background: '#2a2f38' }} />
          <div className="tweaks-row">
            <label>アクセント</label>
            <div className="tweaks-swatches">
              {ACCENT_OPTIONS.rich.map((col) => (
                <div key={col}
                  className={'tweaks-swatch' + (tweaks.accent_rich === col ? ' active' : '')}
                  style={{ background: col }}
                  onClick={() => set('accent_rich', col)} />
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ────────────────────────────────────────────────────────
    // Root — design canvas with all variations
    // ────────────────────────────────────────────────────────
    function App() {
      const [tweaks, setTweaks] = React.useState(window.__TWEAKS);
      const [tweaksOpen, setTweaksOpen] = React.useState(false);

      React.useEffect(() => {
        const onMsg = (e) => {
          if (!e.data || typeof e.data !== 'object') return;
          if (e.data.type === '__activate_edit_mode') setTweaksOpen(true);
          if (e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
        };
        window.addEventListener('message', onMsg);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', onMsg);
      }, []);

      const dark = tweaks.theme === 'dark';

      return (
        <>
          <DesignCanvas>
            <DCSection id="overview" title="Cowork Agent for kintone"
              subtitle="MVP チャットUI — リッチ · ティールアクセント (F-01〜F-09)">
              <DCArtboard id="rich-inhost" label="ホスト統合" width={1280} height={820}>
                <MockKintoneHost>
                  <SidePanel>
                    <VariantRich accent={tweaks.accent_rich} dark={dark} density={tweaks.density} />
                  </SidePanel>
                </MockKintoneHost>
              </DCArtboard>
              <DCArtboard id="rich-solo" label="パネル単体" width={420} height={780}>
                <div style={{ width: '100%', height: '100%', background: '#f0eee9', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <div style={{ width: 380, height: 720, overflow: 'hidden', borderRadius: 12, boxShadow: '0 8px 40px rgba(0,0,0,0.08)', border: '1px solid rgba(0,0,0,0.06)' }}>
                    <VariantRich accent={tweaks.accent_rich} dark={dark} density={tweaks.density} />
                  </div>
                </div>
              </DCArtboard>
              <DCArtboard id="rich-hitl" label="HITL · 承認フロー (F-07)" width={420} height={780}>
                <div style={{ width: '100%', height: '100%', background: '#f0eee9', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <div style={{ width: 380, height: 720, overflow: 'hidden', borderRadius: 12, boxShadow: '0 8px 40px rgba(0,0,0,0.08)', border: '1px solid rgba(0,0,0,0.06)' }}>
                    <HitlPreview variant="rich" accent={tweaks.accent_rich} dark={dark} />
                  </div>
                </div>
              </DCArtboard>
              <DCPostIt top={40} left={-180} rotate={-3} width={160}>
                破壊的操作は必ず影響範囲カード→承認ボタンの2ステップ。
              </DCPostIt>
            </DCSection>
          </DesignCanvas>
          <TweakPanel visible={tweaksOpen} tweaks={tweaks} setTweaks={setTweaks} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
