[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cowork-agent-kintone"
description = "kintone helper library for Cowork Agent (Claude Managed Agents)"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [{ name = "Cowork Agent Contributors" }]
keywords = ["kintone", "cybozu", "claude", "anthropic", "managed-agents"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Typing :: Typed",
]
dependencies = ["requests>=2.32"]
dynamic = ["version"]

[project.optional-dependencies]
dev = [
  "pytest>=8",
  "pytest-cov>=5",
  "responses>=0.25",
  "ruff>=0.6",
  "mypy>=1.11",
  "types-requests>=2.32",
]

[project.urls]
Homepage = "https://github.com/sugimomoto/CoworkAgentForKintone"
Repository = "https://github.com/sugimomoto/CoworkAgentForKintone"
Issues = "https://github.com/sugimomoto/CoworkAgentForKintone/issues"

[tool.hatch.version]
path = "src/cowork_agent_kintone/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/cowork_agent_kintone"]

[tool.hatch.build.targets.sdist]
include = [
  "src/cowork_agent_kintone",
  "tests",
  "README.md",
  "CHANGELOG.md",
  "LICENSE",
]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM", "C4", "RUF"]
ignore = []

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["B011"]  # tests can use assert

[tool.mypy]
strict = true
python_version = "3.11"
files = ["src", "tests"]

[[tool.mypy.overrides]]
module = "responses"
ignore_missing_imports = true

[tool.pytest.ini_options]
addopts = "-ra --strict-markers --cov=cowork_agent_kintone --cov-report=term-missing"
testpaths = ["tests"]
